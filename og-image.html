<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>OG Image Generator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;font-family:Arial,sans-serif;color:#fff}
  .preview{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5);width:900px;height:472px}
  #ogCanvas{display:block;width:900px;height:472px}
  .btn{background:#8BC34A;color:#000;border:none;padding:14px 40px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:0.2s;font-family:inherit}
  .btn:hover{background:#9CCC65}
  .info{color:#666;font-size:0.85rem;text-align:center;line-height:1.6}
  .info a{color:#8BC34A}
  .status{color:#8BC34A;font-size:0.85rem}
</style>
</head>
<body>
  <div class="preview">
    <canvas id="ogCanvas" width="1200" height="630"></canvas>
  </div>
  <button class="btn" id="downloadBtn">Descargar OG Image</button>
  <p class="status" id="status"></p>
  <p class="info">
    Imagen 1200×630px — formato PNG — fondo #0a0a0a<br>
    <a href="index.html">← Volver al sitio</a>
  </p>

  <script>
    const canvas = document.getElementById('ogCanvas');
    const ctx = canvas.getContext('2d');

    const W = 1200, H = 630;

    function drawOG() {
      // Background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      const cx = 600, cy = 250, r = 80;

      // Subtle grid lines
      ctx.strokeStyle = 'rgba(139,195,74,0.03)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }

      // Decorative circles (subtle)
      ctx.strokeStyle = 'rgba(33,150,243,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(1050, 100, 200, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(150, 530, 160, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(850, 500, 80, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(300, 80, 60, 0, Math.PI * 2); ctx.stroke();

      // Diagonal tech lines
      ctx.strokeStyle = 'rgba(139,195,74,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(300, 630); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(900, 0); ctx.lineTo(1200, 280); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(100, 630); ctx.lineTo(400, 0); ctx.stroke();

      // Hidden corner brackets
      ctx.font = '200 30px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = 'rgba(139,195,74,0.04)';
      ctx.fillText('{', 40, 30);
      ctx.fillText('}', 1120, 560);
      ctx.fillStyle = 'rgba(33,150,243,0.04)';
      ctx.fillText('<', 1050, 30);
      ctx.fillText('/>', 40, 570);

      // Radial glow behind logo
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 80);
      glow.addColorStop(0, 'rgba(139,195,74,0.06)');
      glow.addColorStop(1, 'rgba(139,195,74,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 80, 0, Math.PI * 2);
      ctx.fill();

      // Second glow (blue, offset)
      const glow2 = ctx.createRadialGradient(900, 450, 0, 900, 450, 200);
      glow2.addColorStop(0, 'rgba(33,150,243,0.04)');
      glow2.addColorStop(1, 'rgba(33,150,243,0)');
      ctx.fillStyle = glow2;
      ctx.beginPath();
      ctx.arc(900, 450, 200, 0, Math.PI * 2);
      ctx.fill();

      // Scattered particles
      const particles = [
        { x: 200, y: 120, s: 3, c: 'rgba(139,195,74,0.3)' },
        { x: 950, y: 380, s: 4, c: 'rgba(139,195,74,0.2)' },
        { x: 350, y: 480, s: 2, c: 'rgba(33,150,243,0.25)' },
        { x: 850, y: 130, s: 3, c: 'rgba(33,150,243,0.2)' },
        { x: 150, y: 300, s: 2, c: 'rgba(139,195,74,0.15)' },
        { x: 1000, y: 250, s: 2.5, c: 'rgba(139,195,74,0.2)' },
        { x: 500, y: 100, s: 2, c: 'rgba(33,150,243,0.2)' },
        { x: 700, y: 520, s: 3, c: 'rgba(139,195,74,0.2)' },
        { x: 100, y: 480, s: 2, c: 'rgba(139,195,74,0.15)' },
        { x: 1100, y: 80, s: 2.5, c: 'rgba(33,150,243,0.15)' },
        { x: 400, y: 160, s: 1.5, c: 'rgba(139,195,74,0.2)' },
        { x: 800, y: 300, s: 2, c: 'rgba(33,150,243,0.15)' },
        { x: 250, y: 560, s: 3, c: 'rgba(139,195,74,0.1)' },
        { x: 1050, y: 480, s: 2, c: 'rgba(139,195,74,0.15)' },
        { x: 600, y: 580, s: 2, c: 'rgba(33,150,243,0.1)' }
      ];
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
        ctx.fillStyle = p.c;
        ctx.fill();
      });

      // Logo circle
      ctx.strokeStyle = '#8BC34A';
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();

      // Inner subtle circle
      ctx.strokeStyle = 'rgba(139,195,74,0.08)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r - 20, 0, Math.PI * 2);
      ctx.stroke();

      // Code symbol
      ctx.font = '800 62px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      const fullText = '</>';
      const fullWidth = ctx.measureText(fullText).width;
      const leftWidth = ctx.measureText('</').width;
      ctx.fillStyle = '#8BC34A';
      ctx.fillText('</', cx - fullWidth / 2, cy);
      ctx.fillStyle = '#558B2F';
      ctx.fillText('>', cx - fullWidth / 2 + leftWidth, cy);

      // >
      ctx.fillStyle = '#558B2F';
      ctx.fillText('>', startX + lessW + slashGap, cy);

      // Text: LA OFICINA (gradient)
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const grad = ctx.createLinearGradient(cx - 200, 0, cx + 200, 0);
      grad.addColorStop(0, '#8BC34A');
      grad.addColorStop(0.6, '#8BC34A');
      grad.addColorStop(1, '#558B2F');
      ctx.fillStyle = grad;
      ctx.font = '700 72px "Poppins", Arial, sans-serif';
      ctx.fillText('LA OFICINA', cx, 390);
      ctx.shadowBlur = 0;

      // Small accent diamonds flanking title
      ctx.fillStyle = 'rgba(139,195,74,0.3)';
      const diamondY = 390;
      const diamSize = 5;
      ctx.save();
      ctx.translate(cx - 290, diamondY);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-diamSize/2, -diamSize/2, diamSize, diamSize);
      ctx.restore();
      ctx.save();
      ctx.translate(cx + 290, diamondY);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-diamSize/2, -diamSize/2, diamSize, diamSize);
      ctx.restore();

      // Tagline with brackets
      ctx.fillStyle = '#888';
      ctx.font = '400 26px "Poppins", Arial, sans-serif';
      ctx.fillText('Desarrollo y Tecnología', cx, 445);

      // Subtle brackets around tagline
      ctx.strokeStyle = 'rgba(139,195,74,0.25)';
      ctx.lineWidth = 1.5;
      const bracketY = 445;
      const bracketGap = 230;
      ctx.beginPath();
      ctx.moveTo(cx - bracketGap, bracketY - 14);
      ctx.lineTo(cx - bracketGap - 8, bracketY);
      ctx.lineTo(cx - bracketGap, bracketY + 14);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + bracketGap, bracketY - 14);
      ctx.lineTo(cx + bracketGap + 8, bracketY);
      ctx.lineTo(cx + bracketGap, bracketY + 14);
      ctx.stroke();

      // Bottom accent line
      ctx.strokeStyle = '#8BC34A';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - 80, 480);
      ctx.lineTo(cx + 80, 480);
      ctx.stroke();
    }

    drawOG();

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      document.getElementById('status').textContent = '✔ og-image.png descargada';
    });
  </script>
</body>
</html>
