<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>OG Image Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;font-family:Arial,sans-serif;color:#fff}
  .preview{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5);width:900px;height:472px}
  #ogCanvas{display:block;width:900px;height:472px}
  .btn{background:#8BC34A;color:#000;border:none;padding:14px 40px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:0.2s;font-family:'Poppins',Arial,sans-serif}
  .btn:hover{background:#9CCC65}
  .btn-sec{background:#333;color:#8BC34A}
  .btn-sec:hover{background:#444}
  .info{color:#666;font-size:0.85rem;text-align:center;line-height:1.6}
  .info a{color:#8BC34A}
  .status{color:#8BC34A;font-size:0.85rem}
</style>
</head>
<body>
  <div class="preview">
    <canvas id="ogCanvas" width="1200" height="630"></canvas>
  </div>
  <button class="btn" id="downloadBtn">Descargar OG Image (PNG)</button>
  <button class="btn btn-sec" id="downloadJpgBtn">Descargar OG Image (JPG)</button>
  <button class="btn btn-sec" id="favBtn">Descargar Favicon (32×32)</button>
  <p class="status" id="status"></p>
  <p class="info">
    Imagen 1200×630px — fondo #0a0a0a — texto gigante para WhatsApp<br>
    <a href="index.html">← Volver al sitio</a>
  </p>

  <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
  <script>
    const canvas = document.getElementById('ogCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;

    function drawOG() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      const cx = 600, cy = 250, r = 90;

      // Big radial glow behind logo
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 100);
      glow.addColorStop(0, 'rgba(139,195,74,0.12)');
      glow.addColorStop(1, 'rgba(139,195,74,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 100, 0, Math.PI * 2);
      ctx.fill();

      // Second glow bottom-right
      const glow2 = ctx.createRadialGradient(900, 450, 0, 900, 450, 300);
      glow2.addColorStop(0, 'rgba(33,150,243,0.06)');
      glow2.addColorStop(1, 'rgba(33,150,243,0)');
      ctx.fillStyle = glow2;
      ctx.beginPath();
      ctx.arc(900, 450, 300, 0, Math.PI * 2);
      ctx.fill();

      // Logo circle
      ctx.strokeStyle = '#8BC34A';
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();

      // Inner subtle ring
      ctx.strokeStyle = 'rgba(139,195,74,0.12)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r - 22, 0, Math.PI * 2);
      ctx.stroke();

      // Code symbol </>
      ctx.font = '800 85px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      const fullText = '</>';
      const fullWidth = ctx.measureText(fullText).width;
      const leftWidth = ctx.measureText('</').width;
      ctx.fillStyle = '#8BC34A';
      ctx.fillText('</', cx - fullWidth / 2, cy);
      ctx.fillStyle = '#558B2F';
      ctx.fillText('>', cx - fullWidth / 2 + leftWidth, cy);

      // Solid card behind text for max contrast
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 365, W, 185);

      // Text: LA OFICINA
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.font = '900 110px "Poppins", Arial, sans-serif';
      const textGrad = ctx.createLinearGradient(cx - 240, 0, cx + 240, 0);
      textGrad.addColorStop(0, '#8BC34A');
      textGrad.addColorStop(0.5, '#8BC34A');
      textGrad.addColorStop(1, '#558B2F');
      ctx.fillStyle = textGrad;
      ctx.fillText('LA OFICINA', cx, 445);

      // Tagline
      ctx.fillStyle = '#bbb';
      ctx.font = '600 38px "Poppins", Arial, sans-serif';
      ctx.fillText('Desarrollo y Tecnología', cx, 515);

      // Bottom accent line
      ctx.strokeStyle = '#8BC34A';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 100, 550);
      ctx.lineTo(cx + 100, 550);
      ctx.stroke();
    }

    WebFont.load({
      google: { families: ['Poppins:400,600,700,800,900'] },
      active: drawOG,
      inactive: drawOG
    });
  </script>
  <script>
    (function() {
      const c = document.getElementById('ogCanvas');
      const x = c.getContext('2d');

      document.getElementById('downloadBtn').addEventListener('click', () => {
        drawOG();
        setTimeout(() => {
          const link = document.createElement('a');
          link.download = 'og-image.png';
          link.href = c.toDataURL('image/png');
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          document.getElementById('status').textContent = '✔ og-image.png descargada';
        }, 100);
      });

      document.getElementById('downloadJpgBtn').addEventListener('click', () => {
        drawOG();
        setTimeout(() => {
          const link = document.createElement('a');
          link.download = 'og-image.jpg';
          link.href = c.toDataURL('image/jpeg', 0.95);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          document.getElementById('status').textContent = '✔ og-image.jpg descargada';
        }, 100);
      });
    })();

    // Favicon
    const favCanvas = document.createElement('canvas');
    favCanvas.width = 32;
    favCanvas.height = 32;

    function drawFavicon() {
      const fc = favCanvas.getContext('2d');
      const s = 32, cx = 16, cy = 16, r = 13;
      fc.fillStyle = '#0a0a0a';
      fc.fillRect(0, 0, s, s);
      fc.strokeStyle = '#8BC34A';
      fc.lineWidth = 2.5;
      fc.beginPath();
      fc.arc(cx, cy, r, 0, Math.PI * 2);
      fc.stroke();
      fc.strokeStyle = 'rgba(139,195,74,0.15)';
      fc.lineWidth = 0.8;
      fc.beginPath();
      fc.arc(cx, cy, r - 4, 0, Math.PI * 2);
      fc.stroke();
      fc.font = '800 11px "Courier New", monospace';
      fc.textAlign = 'center';
      fc.textBaseline = 'middle';
      fc.fillStyle = '#8BC34A';
      fc.fillText('</>', cx, cy);
    }

    drawFavicon();

    document.getElementById('favBtn').addEventListener('click', () => {
      drawFavicon();
      const link = document.createElement('a');
      link.download = 'favicon.png';
      link.href = favCanvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      document.getElementById('status').textContent = '✔ favicon.png descargada';
    });
  </script>
</body>
</html>
